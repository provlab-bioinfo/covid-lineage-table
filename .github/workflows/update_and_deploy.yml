# Modified from https://www.python-engineer.com/posts/run-python-github-actions/
name: Daily update lineage tree

on:
  workflow_dispatch:
  schedule:
    - cron:  '0 0 * * *'  
  push:    
    branches:
      - main

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      PYTHONDONTWRITEBYTECODE: 1
    steps:
      - name: checkout repo content
        uses: actions/checkout@v4 # checkout the repository content

      - name: create environment with mamba
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-update-conda: true
          python-version: "3.10"
          activate-environment: covid-lineage-table
          environment-file: envs/environment.yml

      - name: execute py script
        shell: bash -l {0}
        run: python scripts/generateTree.py

      - name: commit files
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add -A
          git diff-index --quiet HEAD || (git commit -a -m "updated Pango lineages" --allow-empty)

      - name: push changes
        uses: ad-m/github-push-action@v0.6.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main 

  deploy:
    concurrency: ci-${{ github.ref }} # Recommended if you intend to make multiple deployments in quick succession.
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: . # The folder the action should deploy.
          git-config-name: GitHub Action
          git-config-email: action@github.com
